services:
  - type: web
    name: scanweb-backend
    plan: free
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scanweb-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: scanweb-db
    plan: free
    databaseName: scanweb
    user: scanweb_user
